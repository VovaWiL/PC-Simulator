<!DOCTYPE html>
<html>
<head>
    <title>3D PC Simulator Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            color: white; pointer-events: none;
        }
        .desc { font-size: 12px; color: #aaa; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <h2>PC Simulator 3D</h2>
    <p class="desc">Используй мышь, чтобы вращать корпус</p>
    <div id="stats">Деталей в базе: 150+</div>
    <div id="status" style="color: #00ff00; margin-top: 10px;">Система: Ожидание сборки</div>
</div>

<!-- Подключаем Three.js из CDN -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. Настройка сцены
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. Освещение (как в реальной мастерской)
    const light = new THREE.PointLight(0x00d2ff, 100, 100);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040, 2));

    // 3. Создаем Корпус (Case)
    const caseGeo = new THREE.BoxGeometry(4, 5, 2);
    const caseMat = new THREE.MeshPhongMaterial({ 
        color: 0x111111, 
        transparent: true, 
        opacity: 0.5, 
        side: THREE.DoubleSide 
    });
    const pcCase = new THREE.Mesh(caseGeo, caseMat);
    scene.add(pcCase);

    // 4. Функция создания запчастей
    function createPart(w, h, d, color, x, y, z, name) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshPhongMaterial({ color: color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        scene.add(mesh);
        return mesh;
    }

    // Добавляем "модельки"
    const mobo = createPart(3.5, 4.5, 0.1, 0x1a1a1a, 0, 0, -0.8, "Motherboard"); // Материнка
    const gpu = createPart(2.5, 0.8, 0.5, 0x333333, 0, -0.5, 0, "RTX 4090");    // Видеокарта
    const cpuCooler = createPart(1, 1, 0.8, 0x555555, 0, 1, 0, "CPU Cooler");  // Кулер
    
    // Добавляем RGB подсветку на видеокарту
    const gpuLight = new THREE.PointLight(0xff0000, 10, 2);
    gpuLight.position.set(0, -0.5, 0.3);
    scene.add(gpuLight);

    camera.position.z = 8;

    // 5. Управление камерой
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 6. Анимация
    function animate() {
        requestAnimationFrame(animate);
        
        // Эффект вращения вентиляторов (имитация)
        gpu.rotation.x += 0.01; 
        
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
